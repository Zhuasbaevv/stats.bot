<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <style>
        /* Стили для модального окна входа */
        #auth_modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        input { margin: 10px; padding: 10px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth_modal">
        <h2>Вход в систему</h2>
        <input type="text" id="id_input" placeholder="Введите ваш Telegram ID">
        <input type="password" id="pass_input" placeholder="Введите ваш пароль">
        <button onclick="checkAuth()">Войти</button>
    </div>

    <div id="main_content" class="hidden">
        <h1>Добро пожаловать, <span id="nick"></span>!</h1>
        <p>Ваши баллы: <span id="balls"></span></p>
    </div>

    <script>
        async function checkAuth() {
            const id = document.getElementById('id_input').value;
            const pass = document.getElementById('pass_input').value;

            // Загружаем список из файла db.json (который лежит у тебя в папке сайта)
            const response = await fetch('db.json');
            const users = await response.json();

            // Ищем пользователя с таким ID и ПАРОЛЕМ
            const user = users.find(u => u.id == id && u.pass == pass);

            if (user) {
                // Если данные верны, прячем окно входа и показываем сайт
                document.getElementById('auth_modal').classList.add('hidden');
                document.getElementById('main_content').classList.remove('hidden');
                
                // Подставляем данные в поля
                document.getElementById('nick').innerText = user.nick;
                document.getElementById('balls').innerText = user.balls;
            } else {
                alert("❌ Неверный ID или пароль!");
            }
        }
    </script>
</body>
</html>

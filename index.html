<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Твои стили я оставил без изменений */
        body { background: #101014; color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .avatar { width: 60px; height: 60px; background: #1A1A20; border: 2px solid #FF4141; border-radius: 15px; background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; }
        #auth_modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #101014; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        .auth-card { background: #1A1A20; padding: 30px; border-radius: 25px; text-align: center; width: 80%; }
        .auth-input { width: 100%; background: #101014; border: 1px solid #25252b; padding: 12px; border-radius: 12px; color: white; margin-bottom: 15px; text-align: center; }
        .auth-btn { background: #FF4141; color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; }
        #main_content { filter: blur(10px); }
    </style>
</head>
<body>

    <div id="auth_modal">
        <div class="auth-card">
            <h2>ЗАЩИТА ДОСТУПА</h2>
            <input type="password" id="pass_input" class="auth-input" placeholder="Введите пароль">
            <button class="auth-btn" onclick="checkPass()">ВОЙТИ</button>
        </div>
    </div>

    <div id="main_content">
        <div class="header">
            <div class="user-info">
                <div id="user_avatar" class="avatar"></div>
                <div>
                    <div class="nickname" id="nick">ЗАГРУЗКА...</div>
                    <div class="org">SURGUT</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="grid-item"><div class="grid-val" id="balls">0</div><div class="grid-label">Баллы</div></div>
            <div class="grid-item"><div class="grid-val" id="vigs">0</div><div class="grid-label">Выговоры</div></div>
            <div class="grid-item"><div class="grid-val" id="preds">0</div><div class="grid-label">Пред-ия</div></div>
            <div class="grid-item"><div class="grid-val" id="usts">0</div><div class="grid-label">Устники</div></div>
        </div>

        <div class="card">
            <div class="row"><div>Должность:</div><div id="post">---</div></div>
            </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        
        // 1. Заполняем данные из URL сразу (чтобы сайт не был овощем)
        document.getElementById('nick').innerText = (p.get('nick') || "User").toUpperCase();
        document.getElementById('balls').innerText = p.get('balls') || "0";
        document.getElementById('vigs').innerText = p.get('vigs') || "0";
        document.getElementById('preds').innerText = p.get('preds') || "0";
        document.getElementById('usts').innerText = p.get('usts') || "0";
        document.getElementById('post').innerText = p.get('post') || "---";

        const photoUrl = p.get('photo');
        if (photoUrl && photoUrl !== "none") document.getElementById('user_avatar').style.backgroundImage = `url('${photoUrl}')`;

        // 2. Логика входа
        function checkPass() {
            const input = document.getElementById('pass_input').value;
            const correctPass = p.get('pass'); // Пароль берем из ссылки (как раньше)
            
            if (input === correctPass) {
                document.getElementById('auth_modal').classList.add('hidden');
                document.getElementById('main_content').style.filter = "none";
            } else {
                alert("❌ Неверный пароль!");
            }
        }
    </script>
</body>
</html>
